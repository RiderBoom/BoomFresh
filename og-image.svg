<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#023e8a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#023e8a"/>
      <stop offset="100%" stop-color="#0077b6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="950" cy="120" r="220" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <circle cx="950" cy="120" r="160" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <circle cx="100" cy="550" r="180" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>

  <!-- Logo icon -->
  <rect x="80" y="200" width="90" height="90" rx="20" fill="#0077b6"/>
  <text x="125" y="270" font-family="Arial" font-size="64" font-weight="900" fill="white" text-anchor="middle">B</text>

  <!-- Brand name -->
  <text x="190" y="265" font-family="Arial" font-size="52" font-weight="900" fill="white" letter-spacing="-1">BOOM FRESH</text>

  <!-- Divider line -->
  <rect x="80" y="318" width="500" height="3" rx="2" fill="url(#accent)"/>

  <!-- Tagline Thai -->
  <text x="80" y="375" font-family="Arial" font-size="28" fill="rgba(255,255,255,0.75)">น้ำดื่มสะอาด มาตรฐานสากล · จ.พิจิตร</text>

  <!-- Sub description -->
  <text x="80" y="420" font-family="Arial" font-size="20" fill="rgba(255,255,255,0.45)">RO · UV Sterilization · Ozone · 6 ขั้นตอนความสะอาด</text>

  <!-- Badges -->
  <rect x="80"  y="470" width="140" height="40" rx="20" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <text x="150" y="495" font-family="Arial" font-size="15" font-weight="700" fill="rgba(255,255,255,0.7)" text-anchor="middle">ระบบ RO</text>

  <rect x="234" y="470" width="140" height="40" rx="20" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <text x="304" y="495" font-family="Arial" font-size="15" font-weight="700" fill="rgba(255,255,255,0.7)" text-anchor="middle">UV Sterilize</text>

  <rect x="388" y="470" width="140" height="40" rx="20" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <text x="458" y="495" font-family="Arial" font-size="15" font-weight="700" fill="rgba(255,255,255,0.7)" text-anchor="middle">Ozone</text>

  <rect x="542" y="470" width="180" height="40" rx="20" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <text x="632" y="495" font-family="Arial" font-size="15" font-weight="700" fill="rgba(255,255,255,0.7)" text-anchor="middle">รับทำ OEM</text>

  <!-- URL -->
  <text x="80" y="580" font-family="Arial" font-size="16" fill="rgba(255,255,255,0.3)">boom-fresh.vercel.app</text>

  <!-- Right side: bottle illustration -->
  <g transform="translate(820, 80) scale(2.8)">
    <defs>
      <linearGradient id="bG2" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%"   stop-color="#90e0ef"/>
        <stop offset="100%" stop-color="#48cae4"/>
      </linearGradient>
    </defs>
    <path d="M35 28 L65 28 L70 48 L72 150 Q72 165 50 165 Q28 165 28 150 L30 48 Z"
          fill="url(#bG2)" opacity="0.9"/>
    <path d="M31 90 L69 90 L72 150 Q72 165 50 165 Q28 165 28 150 L31 90 Z"
          fill="#0077b6" opacity="0.4"/>
    <rect x="37" y="13" width="26" height="15" rx="3" fill="#023e8a"/>
    <rect x="27" y="65" width="46" height="48" fill="white" opacity="0.92" rx="2"/>
    <circle cx="50" cy="83" r="13" fill="#023e8a"/>
    <text x="50" y="88" font-family="Arial" font-size="12" fill="white" text-anchor="middle" font-weight="900">B</text>
    <text x="50" y="104" font-family="Arial" font-size="4" fill="#023e8a" text-anchor="middle" font-weight="800">BOOM FRESH</text>
    <path d="M36 52 Q33 85 34 120" stroke="white" stroke-width="2" fill="none" opacity="0.4" stroke-linecap="round"/>
  </g>
</svg>
